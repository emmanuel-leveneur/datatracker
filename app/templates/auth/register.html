{% extends "base.html" %}
{% block title %}Créer un compte — DataTracker{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white shadow-md rounded-xl p-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Créer un compte</h1>

      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded text-sm">{{ error }}</div>
      {% endif %}

      <form method="post" action="/auth/register" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
          <input type="text" name="username" required autofocus
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" name="email" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
          <input type="password" name="password" required minlength="6"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg text-sm transition">
          Créer le compte
        </button>
      </form>

      <p class="mt-4 text-center text-sm text-gray-500">
        Déjà un compte ?
        <a href="/auth/login" class="text-blue-600 hover:underline">Se connecter</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
